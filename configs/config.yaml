# Data Configuration
data:
  dataset_name: "mimic_eye"
  image_size: 224  # ViT standard input size
  patch_size: 16   # Creates 14×14 = 196 patches
  
  # Gaze processing
  gaze_heatmap_size: 224  # Full-resolution heatmap; downsampled to [196] patches in GazePreprocessor
  max_fixations: 50       # Maximum fixation sequence length
  fixation_sigma: 10      # Gaussian kernel sigma for heatmap generation

# Model Configuration  
model:
  # Top-level model params
  num_classes: 2
  dropout: 0.3

  # Pipeline selector: false = BioClinicalBERT + BioGPT (old), true = MedGemma (new)
  use_medgemma: true

  # Modality selection: "image_only" | "image_gaze" | "image_text" | "image_gaze_text"
  # modality: "image_only"
  # modality: "image_gaze"
  # modality: "image_text"
  modality: "image_gaze_text"

  # BERT freeze configuration (only used when modality includes text and use_medgemma: false)
  # Number of epochs to keep BERT frozen before unfreezing
  # Set to 0 to train BERT unfrozen from epoch 1
  bert_freeze_epochs: 5

  # Image Encoder (ViT)
  image_encoder:
    type: "vit_base_patch16_224"
    pretrained: true
    embed_dim: 768
    num_heads: 12
    num_layers: 12

  # Gaze Encoder
  gaze_encoder:
    spatial_hidden_dim: 256
    temporal_hidden_dim: 256
    lstm_layers: 2
    dropout: 0.3

  # MedGemma Configuration (only used when use_medgemma: true)
  medgemma:
    model_name: 'google/medgemma-4b-it'
    max_length: 256
    freeze_vision_tower: true   # MedGemma has its own SigLIP tower — we use our gaze-weighted ViT instead
    freeze_layers: 18           # Freeze bottom ~75% of Gemma layers (24 total), fine-tune top 6

# Decoder Configuration
decoder:
  # BioGPT model from HuggingFace (only used when use_medgemma: false)
  model_name: "microsoft/biogpt"

  # Projection: maps teacher combined features → BioGPT hidden dim (1024)
  input_dim: 2048  # Must match MODALITY_DIMS in teacher.py for image_gaze_text
  hidden_dim: 1024  # BioGPT hidden dimension

  # BioGPT layer freezing
  # BioGPT has 24 transformer layers (0-23)
  # Freeze the bottom N layers, fine-tune the rest
  freeze_layers: 12  # Freeze bottom 50% of layers

  # Text generation parameters
  max_length: 200       # Maximum tokens to generate
  min_length: 50        # Minimum tokens to generate
  num_beams: 4          # Beam search width (higher = better quality but slower)
  no_repeat_ngram_size: 3  # Prevents repeated phrases in output
  early_stopping: true  # Stop beam search when all beams reach EOS

  dropout: 0.1

  # Gaze ablation: set to false to zero out gaze conditioning before decoder input
  # Allows comparing generation quality with vs without gaze guidance
  use_gaze_conditioning: true

# Training Configuration
# NOTE: Best model saved by val AUC (not accuracy)
training:
  batch_size: 32
  num_epochs: 20
  # num_epochs: 2  # Use for quick sanity testing
  learning_rate: 0.0001
  weight_decay: 0.01
  device: 'cuda'  # 'cuda' or 'cpu'
  gpu_id: 1       # 0 or 1 (which GPU to use)
  checkpoint_dir: '/media/16TB_Storage/kavin/models/c3-net'

  # ── MedGemma pipeline loss weights (use_medgemma: true) ──────────────
  # Stage 1: GazePredictor MSE loss only — no weighting needed
  # Stage 2: joint generation + classification
  lambda_gen: 0.7   # Generation cross-entropy (primary task)
  lambda_cls: 0.3   # Auxiliary classification loss

  # Stage 1 training (GazePredictor)
  gaze_predictor_epochs: 5          # Epochs to train GazePredictor before Stage 2
  gaze_predictor_lr: 0.0001         # LR for GazePredictor stage

  # Stage 2 training (MedGemma decoder + classification)
  medgemma_lr: 0.00002              # Lower LR for fine-tuning MedGemma layers
  medgemma_epochs: 20               # Epochs for Stage 2
  # medgemma_epochs: 2              # Use for quick sanity testing

  # ── BioGPT pipeline loss weights (use_medgemma: false) ───────────────
  lambda_gaze_pred: 0.5             # Gaze prediction loss weight
  # lambda_classification = 1.0 - lambda_gaze_pred

  # Decoder training — separate LR since BioGPT is pretrained
  decoder_learning_rate: 0.00002
  decoder_num_epochs: 20
  # decoder_num_epochs: 2           # Use for quick sanity testing